<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <form action="" id="loginForm">
            <h2>Log in!</h2>
            <input class="inp" type="text" id="loginEmail" placeholder="example@gmail.com" required>
            <input class="inp" type="password" id="loginPass" placeholder="password" required>
            <button class="sub-sign" type="submit">Login</button>
            <div class="error"></div>
        </form>
         <p class="switch-auth">Don't have an account ? <a href="register.html">Sign Up</a></p>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
